# DataPrism default configuration
# All values can be overridden by more specific configs or CLI

seed: 42
device: auto
project_name: dataprism
experiment_name: default
output_dir: ./outputs

model:
  name: /root/autodl-tmp/models/Meta-Llama-3.1-8B-Instruct
  trust_remote_code: false
  torch_dtype: bfloat16
  use_flash_attention_2: true
  device_map: auto

lora:
  r: 64
  alpha: 128
  dropout: 0.1
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  target_modules_extra:
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

training:
  num_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  max_seq_length: 2048
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  max_grad_norm: 1.0
  dataloader_num_workers: 4
  remove_unused_columns: false

data:
  name: tatsu-lab/alpaca
  split: train
  num_samples: null
  validation_split: validation
  max_eval_samples: 500
  prompt_template: alpaca
  response_only_loss: true
  shuffle_seed: 42
